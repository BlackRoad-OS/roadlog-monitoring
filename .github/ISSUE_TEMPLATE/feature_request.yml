name: Feature Request
description: Suggest a new feature for RoadLog
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Please describe what you'd like to see.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature would you like?
      placeholder: Describe the feature
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Why would this be useful?
    validations:
      required: true
