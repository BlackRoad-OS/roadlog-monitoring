<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - RoadLog</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            background: #000;
            color: #FFF;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .container { padding: 34px; }
        h1 {
            font-size: 89px;
            font-weight: 700;
            background: linear-gradient(135deg, #FF1D6C 38.2%, #2979FF 61.8%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 21px;
        }
        p { font-size: 18px; opacity: 0.7; margin-bottom: 34px; }
        a {
            display: inline-block;
            padding: 16px 40px;
            background: linear-gradient(135deg, #FF1D6C 38.2%, #2979FF 61.8%);
            color: #FFF;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.3s;
        }
        a:hover { transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>This log entry doesn't exist.</p>
        <a href="/">Back to RoadLog</a>
    </div>
</body>
</html>
